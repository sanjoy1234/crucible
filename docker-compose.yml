version: "3.9"

services:
  crucible:
    build: .
    image: crucible-ai:latest
    volumes:
      - .crucible:/app/.crucible
      - ./examples:/app/examples:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      - chromadb
    networks:
      - crucible-net
    # Override to run: docker compose run crucible crucible run --issue examples/demo_issue.md
    command: crucible doctor

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - crucible-net

  # Optional: Ollama for local model support (zero API cost)
  # Uncomment if you have NVIDIA GPU or run on ARM Mac
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - crucible-net

volumes:
  chromadb_data:
  # ollama_data:

networks:
  crucible-net:
    driver: bridge
